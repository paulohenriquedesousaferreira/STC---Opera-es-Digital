<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STC Digital - Inspeção</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="ICONE.png" type="image/png">

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }
        
        /* LOGIN */
        #telaAcesso { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 50px; box-sizing: border-box; text-align: center; }
        .campo-login { margin-bottom: 15px; text-align: left; }
        .campo-login label { display: block; font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
        .campo-login input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-entrar { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* APP PRINCIPAL */
        #appPrincipal { display: none; width: 100%; max-width: 500px; padding-bottom: 40px; }
        .equipe-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; margin-bottom: 20px; }
        .secao-titulo { font-size: 11px; color: #95a5a6; font-weight: bold; text-transform: uppercase; margin: 15px 0 5px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* INPUTS E SELECTS */
        select, input.busca-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; background-color: #fff; margin-bottom: 5px; box-sizing: border-box; }
        
        .colaborador-linha { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #ddd; }
        .cargo-label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .cargo-label { display: inline-block; padding: 3px 10px; border-radius: 4px; color: white; font-size: 11px; font-weight: bold; }
        .motorista-cor { background: #34495e; }
        .eletricista-cor { background: #f39c12; }

        /* BOTÕES */
        .btn-registrar-geral { width: 100%; padding: 18px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-historico-card { width: 100%; padding: 15px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sair-rodape { width: 100%; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        .check-outro { font-size: 9px; color: #7f8c8d; display: flex; align-items: center; gap: 3px; cursor: pointer; text-transform: none; }

        /* MODAL E HISTÓRICO */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { background: white; padding: 15px; width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .close-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; float: right; font-weight: bold; cursor: pointer; font-size: 12px; }
        .registro-card { background: #fff; border: 1px solid #eee; border-left: 5px solid #2ecc71; padding: 10px; margin-bottom: 10px; border-radius: 8px; position: relative; font-size: 13px; }
        .btn-del { position: absolute; top: 8px; right: 8px; background: #fee; color: #c0392b; border: 1px solid #fcc; padding: 4px; border-radius: 4px; font-size: 9px; cursor: pointer; }

        /* CAIXINHAS RESUMO */
        .container-resumo { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 0; justify-content: center; }
        .card-individual { width: calc(33% - 8px); min-width: 85px; background: #2c3e50; color: white; padding: 8px 4px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s; }
        .card-individual:active { transform: scale(0.95); background: #34495e; }
        .card-individual .nome-res { font-size: 9px; text-transform: uppercase; opacity: 0.8; display: block; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-individual .qtd-res { font-size: 16px; font-weight: bold; display: block; line-height: 1; }
        .card-individual .perc-res { font-size: 9px; background: rgba(255,255,255,0.15); padding: 1px 4px; border-radius: 5px; display: inline-block; margin-top: 4px; }

        /* PENDÊNCIAS */
        .grupo-supervisor { background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 15px; scroll-margin-top: 40px; }
        .header-sup { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 8px; font-size: 14px; }
        .porcentagem-barra { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin: 5px 0; }
        .porcentagem-fill { background: #2ecc71; height: 100%; transition: width 0.5s ease; }
        .linha-pendente { color: #c0392b; font-size: 11px; padding: 2px 0; border-bottom: 1px solid #f2f2f2; }
    </style>
</head>
<body>

    <div id="telaAcesso">
        <h2 style="color: #2c3e50; margin-bottom: 5px;">STC - Operações Digital</h2>
        <p style="font-size: 12px; color: #95a5a6; margin-top: 0;">Taxa de Contato Operacional</p>
        <div class="campo-login"><label>Usuário/Matrícula</label><input type="text" id="mat"></div>
        <div class="campo-login"><label>Senha</label><input type="password" id="sen"></div>
        <button class="btn-entrar" onclick="login()">ENTRAR</button>
    </div>

    <div id="appPrincipal">
        <div class="equipe-card">
            <h3 id="tituloPerfil" style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Painel de Controle</h3>
            
            <div id="blocoSesmt" style="display:none">
                <div class="secao-titulo">Responsável SESMT</div>
                <select id="tecSesmt">
                    <option value="" disabled selected>Técnico de Segurança</option>
                    <option value="GLEIDSON">GLEIDSON</option>
                    <option value="JEOVÁ">JEOVÁH</option>
                </select>
            </div>

            <div class="secao-titulo">Local da Atividade</div>
            <select id="localAtividade">
                <option value="" disabled selected>Local...</option>
                <option value="AGL">AGL</option>
                <option value="SAD">SAD</option>
                <option value="PB">PB</option>
            </select>
         
            <div class="secao-titulo">
                Prefixo Equipe
                <label class="check-outro"><input type="checkbox" id="chkEq" onchange="alternarListaPrefixos(this)"> Outro Supervisor.</label>
            </div>
            <input type="text" id="equipeSelect" class="busca-input" list="listaPrefixos" placeholder="Pesquisar Prefixo...">
            <datalist id="listaPrefixos"></datalist>

            <div class="colaborador-linha">
                <div class="cargo-label-container">
                    <div class="cargo-label motorista-cor">Motorista</div>
                    <label class="check-outro"><input type="checkbox" id="chkMot" onchange="alternarListaIndividual('motorista', this)"> Outro Supervisor.</label>
                </div>
                <input type="text" id="motorista" class="busca-input" list="listaMotoristas" placeholder="Pesquisar Motorista...">
                <datalist id="listaMotoristas"></datalist>
            </div>

            <div class="colaborador-linha">
                <div class="cargo-label-container">
                    <div class="cargo-label eletricista-cor">Eletricista</div>
                    <label class="check-outro"><input type="checkbox" id="chkEle" onchange="alternarListaIndividual('eletricista', this)"> Outro Supervisor.</label>
                </div>
                <input type="text" id="eletricista" class="busca-input" list="listaEletricistas" placeholder="Pesquisar Eletricista...">
                <datalist id="listaEletricistas"></datalist>
            </div>

            <button class="btn-registrar-geral" onclick="registrar()">Registrar Taxa</button>
            <button class="btn-historico-card" onclick="abrirHistorico()">Relatório e Histórico</button>
        </div>

        <button class="btn-sair-rodape" onclick="location.reload()">Sair</button>
        <p style="text-align: center; font-size: 10px; color: #bdc3c7; margin-top: 15px;">STC Digital v1.7</p>
    </div>

    <div id="modalHistorico" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="fecharHistorico()">VOLTAR</div>
            <h2 style="margin-top: 35px; color: #2c3e50; font-size: 16px;">Taxas por Responsável</h2>
            <div id="corpoResumo" class="container-resumo"></div>
            
            <h2 style="color: #2c3e50; font-size: 16px; margin-top: 15px;">Histórico Realizados</h2>
            <div id="corpoRegistros"></div>
            
            <div id="areaAdm" style="display:none; margin-top:10px; border: 1px dashed red; padding: 10px; border-radius: 8px;">
                <p style="color:red; font-size: 11px; margin-top: 0;"><b>ADM:</b></p>
                <button onclick="limparTudo()" style="width:100%; background:#c0392b; color:white; border:none; padding:10px; border-radius:5px; font-weight: bold; cursor:pointer; font-size:12px;">LIMPAR TUDO</button>
            </div>

            <h2 style="margin-top: 25px; border-top: 2px solid #34495e; padding-top: 15px; color: #2c3e50; font-size: 16px;">Relatório Mensal de Pendências</h2>
            <div id="corpoGestao"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAjgbaEPQrTOhSByOcwNpE3Y569FbA06Aw",
        authDomain: "stc-digital-b0521.firebaseapp.com",
        projectId: "stc-digital-b0521",
        storageBucket: "stc-digital-b0521.firebasestorage.app",
        messagingSenderId: "141817904082",
        appId: "1:141817904082:web:47ff34df25b2b7fc09660b",
        measurementId: "G-EP52VE0FZ8"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    let registrosGlobais = [];
    let userAtivo = null;

    const eqFlavio = ["ALDAIR FERREIRA DOS SANTOS", "CARLOS DANIEL DE M SILVA", "DAHLIN ALVES DE OLIVEIRA", "DENISVALDO VERAS DOS SANTOS", "DIEGO DIEFLEI ARAÚJO DA COSTA", "DNILSON CORNELIO OLIVEIRA", "ELISSANDRO BORGES BRITO", "FERNANDO SOARES DA SILVA", "FRANCISCO DE ASSIS DE OLIVEIRA", "FRANCISCO DE ASSIS FELIX DA CONCEIÇÃO", "FRANCISCO MOACIR G O NETO", "FRANCISCO ROGERIO DE ARAUJO", "GELSON GOMES DE SOUSA", "GUILHEME GONÇALVES DOS SANTOS", "HEGON RODRIGUES LIMA", "ISRAEL FERREIRA DE SOUSA RODRIGUES", "JOÃO FERREIRA DE ANDRADE NETO", "JOSÉ ADÃO ANTUNES MENDES", "JOSE KLEBER ANDRA DE CABRAL", "LEANDRO SANTOS DE FARIAS", "LEONARDO PEIXOTO DIAS", "LUCAS LOPES DA SILVA FERREIRA", "MARCOS ANTONIO SILVA", "MARCUS COUTINHO LUCENA", "MARUILO ALVES RODRIGUES", "RAFAEL DA SILVA", "RAIMUNDO DINIZ DA SILVA", "ROBSON BRANDÃO SOARES"].sort();
    const eqDanilo = ["ADÃO MANUEL DE ARAUJO", "ANDERSON VERAS MOREIRAS", "CELIO SILVA DE JESUS", "CLECIO ALVES DOS SANTOS", "DEONE BERNARDES DOS SANTOS", "DEUZIMAR ALVES DA COSTA", "EDCARLOS DE JESUS CARNEIRO", "ELITON JOSÉ RIBEIRO", "FRANCISCO SILVA RODRIGUES", "GABRIEL LEANDRO MATIAS", "GUILHERME AZEVEDO DE ARAUJO", "HELIO PEREIRA DOS SANTOS", "JONATHA MARTINS DE FREITAS", "JONES PASSOS DA CUNHA", "JOSMAR CELESTIANO DA SILVA JUNIOR", "LEONARDO RODRIGUES PEREIRA LIMA", "LUCAS GABRIEL TORRES DA SILVA", "LUIZ FILIPE TELES CARVALHO", "ODELIO GUEDES DE JESUS", "PAULO CESAR DA SILVA", "PAULO RIBEIRO DO NASCIMENTO", "RAIMUNDO RODRIGUES DOS SANTOS", "SILAS LIOMAR SILVA DE LIMA", "SUMAISSON DA SILVA ALMEIDA", "TIAGO SANTOS ARAUJO", "VALDECI VALENTIM DE SOUSA", "WEULISMAR FERREIRA DOS SANTOS FELIX"].sort();
    const eqDionatan = ["ADERLAN MELO DE SOUZA", "ALEXANDRE DE SOUZA SILVA", "ANTONIO RAISSON ALVES PINHEIRO", "CLAUDIO PERREIRA DE SÁ", "CRISTIANO FERREIRA DE ARRUDA", "DOUGLAS NASCIMENTO SOARES", "EDSON JOSE DA SILVA JUNIOR", "FABIO RUBENS ALENCAR DOS SANTOS", "GUSTAVO ALVES DE SOUSA ARAGÃO", "IVANILSON DA SILVA LOPES", "IVONILDO MOURA FIHO", "JEAN RODRIGUES DA SILVA", "JOÃO LUIZ PAULINO DA FONSECA", "JOÃO PAULO ROCHA DE LIMA", "JOEL ALVES LIMA", "JOSE DE RIBAMAR DA SILVA NEVES", "JOSE LUIZ ARAGÃO JUNIOR", "WELISON PEDRO PATRICIO DA SILVA", "JOSE ROMARIO ROCHA DE SOUZA", "LUAN AUGUSTO FRANÇA CONCEIÇÃO", "MARCELO ALVES DA SILVA", "MARCELO AMADO DA SILVA", "RAYDSON PEREIRA ALENCAR", "ROGERIO MARQUER DA SILVA", "RONALDO SENA MARQUES", "RUBEM SOARES PINTO", "SAMUEL ALVES LIMA", "SAMUEL CLESLEY ALVES MIRANDA", "SEBASTIÃO PEREIRA DA SILVA", "TIAGO MENDES LIMA", "VALDIMAR SOUZA ALVES", "WARLEY SATELES DOS SANTOS"].sort();
    const eqRomullo = ["AILTON FREITAS DE AMORIM", "AMARILDO DE JESUS GONÇALVES", "ANTONIO DE PADUA LOPES ROMANO", "DALMI P. DOS SANTOS", "DONIZETE BELTRÃO DOS SANTOS", "EDIMILSON RIBEIRO DA SILVA", "EDUARDO XAVIER DE ARAUJO", "ELIEZ ALVES MADUREIRA", "ERASMO PEREIRA ALVES", "JANES DE ARAUJO CARDOSO", "JOSE LINALDO BARBOSA DE SOUZA", "KAIO DA COSTA E SOUZA", "LINDOMAR ROCHA PEREIRA", "LUCINEI RODRIGUES FIGUEIREDO", "LUIZ RODRIGUES LEAL", "RAFAEL DA ROCHA SANTOS", "REGIS PEREIRA XAVIER", "RENATO DA SILVA RODRIGUES", "TIAGO BRAZ DE OLIVEIRA", "WALDE ADRIANO ALVES DE SOUSA"].sort();
    
    const listaMestre = [...eqFlavio, ...eqDanilo, ...eqDionatan, ...eqRomullo].sort();
    const equipesDanilo = ["AGLC003M", "AGLC008M", "AGLE002M", "AGLE006M", "AGLE002T", "AGLL001M", "AGLL005M", "AGLL007M", "AGLH002M"];
    const equipesDionatan = ["AGLE010M", "AGLE036M", "AGLE013T", "AGLE011M", "AGLE006T", "AGLE010T", "AGLE014T", "AGLE033T", "AGLL003M", "AGLL004M", "AGLL009M"];
    const equipesFlavio = ["AGLC001M", "AGLC002M", "AGLC009M", "AGLE013M", "AGLE003T", "AGLE035T", "AGLE003N", "AGLL012M", "AGLE005N","AGLH001M"];
    const equipesRomullo = ["AGLE007M", "AGLE008M", "AGLE007T", "AGLE008T", "AGLE037N", "AGLL008M", "AGLL010M"];
    const todasEquipes = [...equipesDanilo, ...equipesDionatan, ...equipesFlavio, ...equipesRomullo].sort();

    const usuarios = {
        "1828": {s:"1828", p:"FLAVIO", n:"Flávio de Melo", lista: eqFlavio, eqs: equipesFlavio},
        "Paz": {s:"123", p:"DANILO", n:"Danilo da Paz", lista: eqDanilo, eqs: equipesDanilo},
        "Silva": {s:"123", p:"DIONATAN", n:"Dionatan Silva", lista: eqDionatan, eqs: equipesDionatan},
        "Ubaldino": {s:"123", p:"ROMULLO", n:"Romullo Ubaldino", lista: eqRomullo, eqs: equipesRomullo},
        "Sesmt": {s:"@sesmt", p:"SESMT", n:"SESMT", lista: listaMestre, eqs: todasEquipes},
        "Coord": {s:"000", p:"COORD", n:"Valdemir Pereira", lista: listaMestre, eqs: todasEquipes},
        "Admin": {s:"admin", p:"ADM", n:"Administrador", lista: listaMestre, eqs: todasEquipes}
    };

    const q = query(collection(db, "registros"), orderBy("timestamp", "desc"), limit(1000));
    onSnapshot(q, (snapshot) => {
        registrosGlobais = [];
        snapshot.forEach((doc) => { registrosGlobais.push({ id_fb: doc.id, ...doc.data() }); });
        if(document.getElementById('modalHistorico').style.display === "block") abrirHistorico();
    });

    window.login = function() {
        const m = document.getElementById('mat').value;
        const s = document.getElementById('sen').value;
        if(usuarios[m] && usuarios[m].s === s){
            userAtivo = usuarios[m];
            document.getElementById('telaAcesso').style.display='none';
            document.getElementById('appPrincipal').style.display='block';
            document.getElementById('tituloPerfil').innerText = userAtivo.n;
            if(userAtivo.p === 'SESMT') document.getElementById('blocoSesmt').style.display='block';
            if(userAtivo.p === 'ADM') document.getElementById('areaAdm').style.display='block';
            
            // Mobile fix: carregar listas após o app principal estar visível
            setTimeout(() => {
                carregarSelects(userAtivo.lista, userAtivo.eqs);
            }, 200);
        } else alert("Dados incorretos!");
    }

    function atualizarDatalist(idList, dados) {
        const list = document.getElementById(idList);
        if(!list) return;

        list.innerHTML = "";
        const fragment = document.createDocumentFragment();
        
        dados.forEach(item => { 
            const opt = document.createElement('option'); 
            opt.value = item; 
            opt.textContent = item; // Mobile fix
            fragment.appendChild(opt); 
        });
        list.appendChild(fragment);

        // Reinicia o vínculo do input para mobile detectar mudança
        const inputVinculado = document.querySelector(`input[list="${idList}"]`);
        if (inputVinculado) {
            const temp = inputVinculado.getAttribute('list');
            inputVinculado.setAttribute('list', '');
            setTimeout(() => inputVinculado.setAttribute('list', temp), 0);
        }
    }

    window.alternarListaPrefixos = function(chk) {
        const dados = chk.checked ? todasEquipes : userAtivo.eqs;
        atualizarDatalist('listaPrefixos', dados);
        document.getElementById('equipeSelect').value = "";
    }

    window.alternarListaIndividual = function(tipo, chk) {
        const listId = tipo === 'motorista' ? 'listaMotoristas' : 'listaEletricistas';
        const dados = chk.checked ? listaMestre : userAtivo.lista;
        atualizarDatalist(listId, dados);
        document.getElementById(tipo).value = "";
    }

    function carregarSelects(colabs, equipes) {
        atualizarDatalist('listaMotoristas', colabs);
        atualizarDatalist('listaEletricistas', colabs);
        atualizarDatalist('listaPrefixos', equipes);
    }

    window.registrar = async function() {
        const mot = document.getElementById('motorista').value;
        const ele = document.getElementById('eletricista').value;
        const eqp = document.getElementById('equipeSelect').value;
        const loc = document.getElementById('localAtividade').value;
        let tec = (userAtivo.p === 'SESMT') ? document.getElementById('tecSesmt').value : "";

        if((userAtivo.p === 'SESMT' && !tec) || !mot || !ele || !eqp || !loc) { return alert("⚠️ ERRO: Preencha todos os campos!"); }

        const reg = {
            timestamp: Date.now(),
            data: new Date().toLocaleDateString('pt-BR'),
            hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            local: loc, eqp, mot, ele, 
            resp: (userAtivo.p === 'SESMT') ? tec : userAtivo.n
        };

        try {
            await addDoc(collection(db, "registros"), reg);
            alert("✅ Registrado com sucesso!");
            document.getElementById('motorista').value = document.getElementById('eletricista').value = document.getElementById('equipeSelect').value = "";
            document.getElementById('localAtividade').selectedIndex = 0;
        } catch (e) { alert("Erro ao salvar!"); }
    }

    window.abrirHistorico = function() {
        const corpoG = document.getElementById('corpoGestao');
        const corpoR = document.getElementById('corpoRegistros');
        const corpoRes = document.getElementById('corpoResumo');
        corpoG.innerHTML = corpoR.innerHTML = corpoRes.innerHTML = "";
        
        const agora = new Date();
        const mesAtual = agora.getMonth();
        const anoAtual = agora.getFullYear();

        let rMes = registrosGlobais.filter(r => {
            const partes = r.data.split('/');
            const dataReg = new Date(partes[2], partes[1] - 1, partes[0]);
            return dataReg.getMonth() === mesAtual && dataReg.getFullYear() === anoAtual;
        });

        let totalMes = rMes.length;
        const resps = ["Danilo da Paz", "Dionatan Silva", "Flávio de Melo", "Romullo Ubaldino", "Valdivino Siqueira", "GLEIDSON", "JEOVÁ"];
        
        resps.forEach(nome => {
            let qtd = rMes.filter(r => r.resp.toUpperCase().includes(nome.toUpperCase())).length;
            let perc = totalMes > 0 ? Math.round((qtd / totalMes) * 100) : 0;
            let idLink = "sup_" + nome.split(' ')[0];
            corpoRes.innerHTML += `<div class="card-individual" onclick="document.getElementById('${idLink}').scrollIntoView({behavior:'smooth'})">
                <span class="nome-res">${nome.split(' ')[0]}</span>
                <span class="qtd-res">${qtd}</span>
                <span class="perc-res">${perc}%</span>
            </div>`;
        });

        let rFiltrado = (['COORD','SESMT','ADM'].includes(userAtivo.p)) ? rMes : rMes.filter(r => userAtivo.lista.includes(r.mot) || userAtivo.lista.includes(r.ele));
        rFiltrado.forEach(r => {
            let btnDel = (userAtivo.p === 'ADM') ? `<button class="btn-del" onclick="apagarUm('${r.id_fb}')">Apagar</button>` : '';
            corpoR.innerHTML += `<div class="registro-card">${btnDel}<small>${r.data} | ⏰ ${r.hora} | ${r.resp}</small><br><strong>EQUIPE: ${r.eqp}</strong><br>🚗 Motorista: ${r.mot}<br>⚡ Eletricista: ${r.ele}</div>`; 
        });

        const nomesFeitosGlobal = rMes.flatMap(r => [r.mot, r.ele]);
        const sups = [
            {nome: "Flávio de Melo", lista: eqFlavio}, 
            {nome: "Danilo da Paz", lista: eqDanilo}, 
            {nome: "Dionatan Silva", lista: eqDionatan}, 
            {nome: "Romullo Ubaldino", lista: eqRomullo}
        ];

        sups.forEach(sup => {
            let pends = sup.lista.filter(n => !nomesFeitosGlobal.includes(n));
            let realizados = sup.lista.length - pends.length;
            let perc = Math.round((realizados / sup.lista.length) * 100);
            let idDiv = "sup_" + sup.nome.split(' ')[0];
            
            let html = `<div class="grupo-supervisor" id="${idDiv}"><div class="header-sup"><span>${sup.nome}</span><span>${realizados}/${sup.lista.length} (${perc}%)</span></div><div class="porcentagem-barra"><div class="porcentagem-fill" style="width:${perc}%"></div></div><div style="margin-top:8px; font-weight:bold; font-size:10px; color:#e74c3c">FALTAM NO MÊS:</div>`;
            if(pends.length === 0) html += "<div style='color:green; font-size:11px; font-weight:bold;'>✅ Meta Mensal Batida!</div>";
            else pends.forEach(p => html += `<div class="linha-pendente">• ${p}</div>`);
            corpoG.innerHTML += html + `</div>`;
        });

        document.getElementById('modalHistorico').style.display = "block";
    }

    window.fecharHistorico = () => document.getElementById('modalHistorico').style.display = "none";
    window.apagarUm = async function(id) { if(confirm("Apagar?")) await deleteDoc(doc(db, "registros", id)); }
    window.limparTudo = () => alert("Acesso restrito.");
</script>
</body>
</html>
