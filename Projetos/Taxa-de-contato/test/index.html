<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STC Digital - Inspeção</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }
        
        /* LOGIN */
        #telaAcesso { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 50px; box-sizing: border-box; text-align: center; }
        .campo-login { margin-bottom: 15px; text-align: left; }
        .campo-login label { display: block; font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
        .campo-login input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-entrar { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* APP PRINCIPAL */
        #appPrincipal { display: none; width: 100%; max-width: 500px; padding-bottom: 40px; }
        .equipe-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; margin-bottom: 20px; }
        .secao-titulo { font-size: 11px; color: #95a5a6; font-weight: bold; text-transform: uppercase; margin: 15px 0 5px 0; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; background-color: #fff; margin-bottom: 5px; }
        .colaborador-linha { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #ddd; }
        .cargo-label { display: inline-block; padding: 3px 10px; border-radius: 4px; color: white; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .motorista-cor { background: #34495e; }
        .eletricista-cor { background: #f39c12; }

        /* BOTÕES */
        .btn-registrar-geral { width: 100%; padding: 18px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-historico-card { width: 100%; padding: 15px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-sair-rodape { width: 100%; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }

        /* MODAL E HISTÓRICO */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { background: white; padding: 15px; width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .close-btn { background: #e74c3c; color: white; padding: 8px 15px; border-radius: 5px; float: right; font-weight: bold; cursor: pointer; font-size: 12px; }
        .registro-card { background: #fff; border: 1px solid #eee; border-left: 5px solid #2ecc71; padding: 10px; margin-bottom: 10px; border-radius: 8px; position: relative; font-size: 13px; }
        .btn-del { position: absolute; top: 8px; right: 8px; background: #fee; color: #c0392b; border: 1px solid #fcc; padding: 4px; border-radius: 4px; font-size: 9px; cursor: pointer; }

        /* CAIXINHAS RESUMO */
        .container-resumo { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 0; justify-content: center; }
        .card-individual { width: calc(33% - 8px); min-width: 85px; background: #2c3e50; color: white; padding: 8px 4px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card-individual .nome-res { font-size: 9px; text-transform: uppercase; opacity: 0.8; display: block; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-individual .qtd-res { font-size: 16px; font-weight: bold; display: block; line-height: 1; }
        .card-individual .perc-res { font-size: 9px; background: rgba(255,255,255,0.15); padding: 1px 4px; border-radius: 5px; display: inline-block; margin-top: 4px; }

        /* PENDÊNCIAS */
        .grupo-supervisor { background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .header-sup { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 8px; font-size: 14px; }
        .porcentagem-barra { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin: 5px 0; }
        .porcentagem-fill { background: #2ecc71; height: 100%; transition: width 0.5s ease; }
        .linha-pendente { color: #c0392b; font-size: 11px; padding: 2px 0; border-bottom: 1px solid #f2f2f2; }
    </style>
</head>
<body>

    <div id="telaAcesso">
        <h2 style="color: #2c3e50; margin-bottom: 5px;">STC - Operações Digital</h2>
        <p style="font-size: 12px; color: #95a5a6; margin-top: 0;">Taxa de Contato Operacional</p>
        <div class="campo-login"><label>Usuário/Matrícula</label><input type="text" id="mat"></div>
        <div class="campo-login"><label>Senha</label><input type="password" id="sen"></div>
        <button class="btn-entrar" onclick="login()">ENTRAR</button>
    </div>

    <div id="appPrincipal">
        <div class="equipe-card">
            <h3 id="tituloPerfil" style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Painel de Controle</h3>
            
            <div id="blocoSesmt" style="display:none">
                <div class="secao-titulo">Responsável SESMT</div>
                <select id="tecSesmt">
                    <option value="" disabled selected>Técnico de Segurança</option>
                    <option value="GLEIDSON">GLEIDSON</option>
                    <option value="JEOVÁ">JEOVÁ</option>
                </select>
            </div>

            <div class="secao-titulo">Local da Atividade</div>
            <select id="localAtividade">
                <option value="" disabled selected>Local...</option>
                <option value="AGL">AGL</option>
                <option value="SAD">SAD</option>
                <option value="PB">PB</option>
            </select>

            <div class="secao-titulo">Prefixo Equipe</div>
            <select id="equipeSelect"></select>

            <div class="colaborador-linha">
                <div class="cargo-label motorista-cor">Motorista</div>
                <select id="motorista"></select>
            </div>
            <div class="colaborador-linha">
                <div class="cargo-label eletricista-cor">Eletricista</div>
                <select id="eletricista"></select>
            </div>

            <button class="btn-registrar-geral" onclick="registrar()">Registrar Taxa</button>
            <button class="btn-historico-card" onclick="abrirHistorico()">Relatório e Histórico</button>
        </div>

        <button class="btn-sair-rodape" onclick="location.reload()">Sair do Sistema</button>
        <p style="text-align: center; font-size: 10px; color: #bdc3c7; margin-top: 15px;">STC Digital v1.3</p>
    </div>

    <div id="modalHistorico" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="fecharHistorico()">VOLTAR</div>
            
            <h2 style="margin-top: 35px; color: #2c3e50; font-size: 16px;">Taxas por Responsável</h2>
            <div id="corpoResumo" class="container-resumo"></div>

            <h2 style="color: #2c3e50; font-size: 16px; margin-top: 15px;">Histórico Hoje</h2>
            <div id="corpoRegistros"></div>
            
            <div id="areaAdm" style="display:none; margin-top:10px; border: 1px dashed red; padding: 10px; border-radius: 8px;">
                <p style="color:red; font-size: 11px; margin-top: 0;"><b>ADM:</b></p>
                <button onclick="limparTudo()" style="width:100%; background:#c0392b; color:white; border:none; padding:10px; border-radius:5px; font-weight: bold; cursor:pointer; font-size:12px;">LIMPAR TUDO</button>
            </div>

            <h2 style="margin-top: 25px; border-top: 2px solid #34495e; padding-top: 15px; color: #2c3e50; font-size: 16px;">Pendências de MARÇO</h2>
            <div id="corpoGestao"></div>
        </div>
    </div>

    <script>
        const eqFlavio = ["ALDAIR FERREIRA DOS SANTOS", "CARLOS DANIEL DE M SILVA", "DAHLIN ALVES DE OLIVEIRA", "DENISVALDO VERAS DOS SANTOS", "DIEGO DIEFLEI ARAÚJO DA COSTA", "DNILSON CORNELIO OLIVEIRA", "ELISSANDRO BORGES BRITO", "FERNANDO SOARES DA SILVA", "FRANCISCO DE ASSIS DE OLIVEIRA", "FRANCISCO DE ASSIS FELIX DA CONCEIÇÃO", "FRANCISCO MOACIR G O NETO", "FRANCISCO ROGERIO DE ARAUJO", "GELSON GOMES DE SOUSA", "GUILHEME GONÇALVES DOS SANTOS", "HEGON RODRIGUES LIMA", "ISRAEL FERREIRA DE SOUSA RODRIGUES", "JOÃO FERREIRA DE ANDRADE NETO", "JOSÉ ADÃO ANTUNES MENDES", "JOSE KLEBER ANDRADECABRAL", "LEANDRO SANTOS DE FARIAS", "LEONARDO PEIXOTO DIAS", "LUCAS LOPES DA SILVA FERREIRA", "MARCOS ANTONIO SILVA", "MARCUS COUTINHO LUCENA", "MARUILO ALVES RODRIGUES", "RAFAEL DA SILVA", "RAIMUNDO DINIZ DA SILVA", "ROBSON BRANDÃO SOARES", "WELISON PEDRO PATRICIO DA SILVA"].sort();
        const eqDanilo = ["ADÃO MANUEL DE ARAUJO", "ANDERSON VERAS MOREIRAS", "CELIO SILVA DE JESUS", "CLECIO ALVES DOS SANTOS", "DEONE BERNARDES DOS SANTOS", "DEUZIMAR ALVES DA COSTA", "EDCARLOS DE JESUS CARNEIRO", "ELITON JOSÉ RIBEIRO", "FRANCISCO SILVA RODRIGUES", "GABRIEL LEANDRO MATIAS", "GUILHERME AZEVEDO DE ARAUJO", "HELIO PEREIRA DOS SANTOS", "JONATHA MARTINS DE FREITAS", "JONES PASSOS DA CUNHA", "JOSMAR CELESTIANO DA SILVA JUNIOR", "LEONARDO RODRIGUES PEREIRA LIMA", "LUCAS GABRIEL TORRES DA SILVA", "LUIZ FILIPE TELES CARVALHO", "MANOEL MARTINS DA SILVA", "ODELIO GUEDES DE JESUS", "PAULO CESAR DA SILVA", "PAULO HENRIQUE DE SOUSA FERREIRA C", "PAULO RIBEIRO DO NASCIMENTO", "RAIMUNDO RODRIGUES DOS SANTOS", "SILAS LIOMAR SILVA DE LIMA", "SUMAISSON DA SILVA ALMEIDA", "TIAGO SANTOS ARAUJO", "VALDECI VALENTIM DE SOUSA", "WEULISMAR FERREIRA DOS SANTOS FELIX"].sort();
        const eqDionatan = ["ADERLAN MELO DE SOUZA", "ALEXANDRE DE SOUZA SILVA", "ANTONIO RAISSON ALVES PINHEIRO", "CLAUDIO PERREIRA DE SÁ", "CRISTIANO FERREIRA DE ARRUDA", "DIONIZIO PAULINO DA FONSECA", "DOUGLAS NASCIMENTO SOARES", "EDSON JOSE DA SILVA JUNIOR", "FABIO RUBENS ALENCAR DOS SANTOS", "FLAVIO DE MELO RIBEIRO", "GUSTAVO ALVES DE SOUSA ARAGÃO", "IVANILSON DA SILVA LOPES", "IVONILDO MOURA FIHO", "JEAN RODRIGUES DA SILVA", "JOÃO LUIZ PAULINO DA FONSECA", "JOÃO PAULO ROCHA DE LIMA", "JOEL ALVES LIMA", "JOSE DE RIBAMAR DA SILVA NEVES", "JOSE LUIZ ARAGÃO JUNIOR", "JOSE MARCOS BONFIM DE ARAUJO", "JOSE ROMARIO ROCHA DE SOUZA", "LUAN AUGUSTO FRANÇA CONCEIÇÃO", "MARCELO ALVES DA SILVA", "MARCELO AMADO DA SILVA", "RAYDSON PEREIRA ALENCAR", "ROGERIO MARQUER DA SILVA", "RONALDO SENA MARQUES", "RUBEM SOARES PINTO", "SAMUEL ALVES LIMA", "SAMUEL CLESLEY ALVES MIRANDA", "SEBASTIÃO PEREIRA DA SILVA", "TIAGO MENDES LIMA", "VALDIMAR SOUZA ALVES", "WARLEY SATELES DOS SANTOS"].sort();
        const eqRomullo = ["AILTON FREITAS DE AMORIM", "AMARILDO DE JESUS GONÇALVES", "ANTONIO DE PADUA LOPES ROMANO", "DALMI P. DOS SANTOS", "DONIZETE BELTRÃO DOS SANTOS", "EDIMILSON RIBEIRO DA SILVA", "EDUARDO XAVIER DE ARAUJO", "ELIEZ ALVES MADUREIRA", "ERASMO PEREIRA ALVES", "JANES DE ARAUJO CARDOSO", "JOSE LINALDO BARBOSA DE SOUZA", "KAIO DA COSTA E SOUZA", "LINDOMAR ROCHA PEREIRA", "LUCINEI RODRIGUES FIGUEIREDO", "LUIZ RODRIGUES LEAL", "RAFAEL DA ROCHA SANTOS", "REGIS PEREIRA XAVIER", "RENATO DA SILVA RODRIGUES", "TIAGO BRAZ DE OLIVEIRA", "WALDE ADRIANO ALVES DE SOUSA"].sort();
        
        const listaMestre = [...eqFlavio, ...eqDanilo, ...eqDionatan, ...eqRomullo].sort();

        const equipesDanilo = ["AGLC003M", "AGLC008M", "AGLE002M", "AGLE006M", "AGLE011M", "AGLE013M", "AGLL001M", "AGLL005M", "AGLL007M", "AGLH002M"];
        const equipesDionatan = ["AGLE007T", "AGLE008T", "AGLE010T", "AGLE014T", "AGLE033T", "AGLE035T", "AGLE005N", "AGLL003M", "AGLL004M", "AGLL009M"];
        const equipesFlavio = ["AGLC001M", "AGLC002M", "AGLC009M", "AGLE007M", "AGLE008M", "AGLE010M", "AGLE013T", "AGLE003N", "AGLL012M", "AGLH001M"];
        const equipesRomullo = ["AGLE036M", "AGLE002T", "AGLE003T", "AGLE006T", "AGLE037N", "AGLL008M", "AGLL010M"];
        const todasEquipes = [...equipesDanilo, ...equipesDionatan, ...equipesFlavio, ...equipesRomullo].sort();

        let userAtivo = null;
        const usuarios = {
            "1828": {s:"1828", p:"FLAVIO", n:"Flávio de Melo", lista: eqFlavio, eqs: equipesFlavio},
            "1001": {s:"123", p:"DANILO", n:"Danilo da Paz", lista: eqDanilo, eqs: equipesDanilo},
            "1002": {s:"123", p:"DIONATAN", n:"Dionatan Silva", lista: eqDionatan, eqs: equipesDionatan},
            "1003": {s:"123", p:"ROMULLO", n:"Romullo Ubaldino", lista: eqRomullo, eqs: equipesRomullo},
            "#sesmt": {s:"@sesmt", p:"SESMT", n:"SESMT", lista: listaMestre, eqs: todasEquipes},
            "1000": {s:"456", p:"COORD", n:"Valdivino Siqueira", lista: listaMestre, eqs: todasEquipes},
            "#admin": {s:"admin", p:"ADM", n:"Administrador", lista: listaMestre, eqs: todasEquipes}
        };

        function login() {
            const m = document.getElementById('mat').value;
            const s = document.getElementById('sen').value;
            if(usuarios[m] && usuarios[m].s === s){
                userAtivo = usuarios[m];
                document.getElementById('telaAcesso').style.display='none';
                document.getElementById('appPrincipal').style.display='block';
                document.getElementById('tituloPerfil').innerText = userAtivo.n;
                if(userAtivo.p === 'SESMT') document.getElementById('blocoSesmt').style.display='block';
                if(userAtivo.p === 'ADM') document.getElementById('areaAdm').style.display='block';
                carregarSelects(userAtivo.lista, userAtivo.eqs);
            } else alert("Dados incorretos!");
        }

        function carregarSelects(colabs, equipes) {
            const m = document.getElementById('motorista'); const e = document.getElementById('eletricista');
            const eqS = document.getElementById('equipeSelect');
            m.innerHTML = e.innerHTML = '<option value="" disabled selected>Selecionar Colaborador...</option>';
            eqS.innerHTML = '<option value="" disabled selected>Selecionar Prefixo...</option>';
            colabs.forEach(n => { m.options[m.options.length] = new Option(n, n); e.options[e.options.length] = new Option(n, n); });
            equipes.forEach(q => { eqS.options[eqS.options.length] = new Option(q, q); });
        }

        function registrar() {
            const mot = document.getElementById('motorista').value;
            const ele = document.getElementById('eletricista').value;
            const eqp = document.getElementById('equipeSelect').value;
            const loc = document.getElementById('localAtividade').value;
            let tec = "";

            if(userAtivo.p === 'SESMT') {
                tec = document.getElementById('tecSesmt').value;
                if(!tec) return alert("⚠️ Selecione o Técnico do SESMT!");
            }

            if(!mot || mot === "" || !ele || ele === "" || !eqp || eqp === "" || !loc || loc === "") {
                return alert("⚠️ ERRO: Todos os campos devem ser preenchidos!");
            }

            const reg = {
                id: Date.now(),
                data: new Date().toLocaleDateString('pt-BR'),
                hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
                local: loc,
                eqp: eqp, mot, ele, 
                resp: (userAtivo.p === 'SESMT') ? tec : userAtivo.n
            };

            let h = JSON.parse(localStorage.getItem('stc_v10')) || [];
            h.push(reg);
            localStorage.setItem('stc_v10', JSON.stringify(h));
            
            alert("✅ Taxa registrada com sucesso!");
            
            document.getElementById('motorista').selectedIndex = 0;
            document.getElementById('eletricista').selectedIndex = 0;
            document.getElementById('equipeSelect').selectedIndex = 0;
            document.getElementById('localAtividade').selectedIndex = 0;
        }

        function abrirHistorico() {
            const corpoG = document.getElementById('corpoGestao');
            const corpoR = document.getElementById('corpoRegistros');
            const corpoRes = document.getElementById('corpoResumo');
            corpoG.innerHTML = ""; corpoR.innerHTML = ""; corpoRes.innerHTML = "";
            
            const hoje = new Date().toLocaleDateString('pt-BR');
            let h = JSON.parse(localStorage.getItem('stc_v10')) || [];
            let rHoje = h.filter(r => r.data === hoje);
            let totalHoje = rHoje.length;

            const resps = ["Danilo da Paz", "Dionatan Silva", "Flávio de Melo", "Romullo Ubaldino", "Valdivino Siqueira", "GLEIDSON", "JEOVÁ"];
            resps.forEach(nome => {
                let qtd = rHoje.filter(r => r.resp.toUpperCase() === nome.toUpperCase()).length;
                let perc = totalHoje > 0 ? Math.round((qtd / totalHoje) * 100) : 0;
                
                corpoRes.innerHTML += `
                    <div class="card-individual">
                        <span class="nome-res">${nome.split(' ')[0]}</span>
                        <span class="qtd-res">${qtd}</span>
                        <span class="perc-res">${perc}%</span>
                    </div>`;
            });

            let rFiltrado = (['COORD','SESMT','ADM'].includes(userAtivo.p)) 
                ? rHoje : rHoje.filter(r => userAtivo.lista.includes(r.mot) || userAtivo.lista.includes(r.ele));

            let nomesFeitosGlobal = rHoje.flatMap(r => [r.mot, r.ele]);

            if(rFiltrado.length === 0) corpoR.innerHTML = "<p style='text-align:center; color:#999;'>Nenhum registro hoje.</p>";
            rFiltrado.slice().reverse().forEach(r => {
                let btnDel = (userAtivo.p === 'ADM') ? `<button class="btn-del" onclick="apagarUm(${r.id})">Apagar</button>` : '';
                corpoR.innerHTML += `
                    <div class="registro-card">
                        ${btnDel}
                        <small>📍 [${r.local}] | ⏰ ${r.hora} | ${r.resp}</small><br>
                        <strong>EQUIPE: ${r.eqp}</strong> <br>
                        🚗 Motorista: ${r.mot}<br> 
                        ⚡ Eletricista: ${r.ele}
                    </div>`;
            });

            const sups = [
                {nome: "Flávio de Melo", lista: eqFlavio, id: "FLAVIO"},
                {nome: "Danilo da Paz", lista: eqDanilo, id: "DANILO"},
                {nome: "Dionatan da Silva", lista: eqDionatan, id: "DIONATAN"},
                {nome: "Romullo Ubaldino", lista: eqRomullo, id: "ROMULLO"}
            ];

            const paraMostrar = (['COORD','SESMT','ADM'].includes(userAtivo.p)) ? sups : sups.filter(s => s.id === userAtivo.p);

            paraMostrar.forEach(sup => {
                let pends = sup.lista.filter(n => !nomesFeitosGlobal.includes(n));
                let total = sup.lista.length;
                let realizados = total - pends.length;
                let perc = total > 0 ? Math.round((realizados / total) * 100) : 0;

                let html = `
                    <div class="grupo-supervisor">
                        <div class="header-sup">
                            <span>${sup.nome}</span> 
                            <span>${realizados}/${total} (${perc}%)</span>
                        </div>
                        <div class="porcentagem-barra">
                            <div class="porcentagem-fill" style="width:${perc}%"></div>
                        </div>
                        <div style="margin-top:8px; font-weight:bold; font-size:10px; color:#e74c3c">FALTAM:</div>
                `;
                
                if(pends.length === 0) {
                    html += "<div style='color:green; font-size:11px; font-weight:bold;'>✅ Meta Batida!</div>";
                } else {
                    pends.forEach(p => html += `<div class="linha-pendente">• ${p}</div>`);
                }
                
                html += `</div>`;
                corpoG.innerHTML += html;
            });
            document.getElementById('modalHistorico').style.display = "block";
        }

        function fecharHistorico() { document.getElementById('modalHistorico').style.display = "none"; }

        function apagarUm(id) {
            if(confirm("Apagar registro?")) {
                let h = JSON.parse(localStorage.getItem('stc_v10')) || [];
                h = h.filter(r => r.id !== id);
                localStorage.setItem('stc_v10', JSON.stringify(h));
                abrirHistorico();
            }
        }

        function limparTudo() {
            if(confirm("⚠️ LIMPAR TUDO?")) {
                localStorage.removeItem('stc_v10');
                abrirHistorico();
            }
        }
    </script>
</body>
</html>
