<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Taxas - Flavio de Melo</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
        }

        h1 { color: #1a2a3a; margin-bottom: 20px; font-size: 22px; text-align: center; }

        .equipe-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .secao-titulo {
            font-size: 11px;
            color: #95a5a6;
            font-weight: bold;
            text-transform: uppercase;
            margin: 15px 0 5px 0;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 15px; /* Maior para facilitar toque no celular */
            background-color: #fff;
        }

        .colaborador-linha {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #ddd;
        }

        .cargo-label {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .motorista-cor { background: #34495e; }
        .eletricista-cor { background: #f39c12; }

        .btn-registrar-geral {
            width: 100%;
            padding: 18px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-historico {
            margin-top: 20px;
            padding: 10px 25px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            max-width: 465px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal-content {
            background: white;
            margin: 0;
            padding: 20px;
            width: 100%;
            height: 100%; /* Ocupa tela cheia no celular para melhor leitura */
            box-sizing: border-box;
            overflow-y: auto;
            position: relative;
        }

        .close-btn { 
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            float: right;
            font-weight: bold;
            cursor: pointer;
        }

        /* NOVO FORMATO DE REGISTRO (Cards em vez de Tabela) */
        .registro-card {
            background: #fff;
            border: 1px solid #eee;
            border-left: 5px solid #2ecc71;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .registro-info {
            font-size: 14px;
            margin: 4px 0;
            color: #2c3e50;
        }

        .registro-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #7f8c8d;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 5px;
            margin-bottom: 8px;
        }

        /* PENDENTES */
        .pendentes-container {
            margin-top: 20px;
            background: #fdf2f2;
            padding: 15px;
            border-radius: 10px;
        }

        .linha-pendente {
            padding: 10px 0;
            border-bottom: 1px solid #f5c6cb;
            color: #721c24;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>Taxas de Contato</h1>

    <div class="equipe-card">
        <div class="secao-titulo">Identificação da Equipe</div>
        <select id="equipe">
            <option value="" disabled selected>PREFIXO...</option>
            <option value="AGLE013M">AGLE013M</option>
            <option value="AGLE003T">AGLE003T</option>
            <option value="AGLE035T">AGLE035T</option>
            <option value="AGLE003N">AGLE003N</option>
            <option value="AGLE005N">AGLE005N</option>
            <option value="AGLL012M">AGLL012M</option>
            <option value="AGLC001M">AGLC001M</option>
            <option value="AGLC002M">AGLC002M</option>
            <option value="AGLC009M">AGLC009M</option>
            <option value="AGLH001M">AGLH001M</option>
        </select>

        <div class="secao-titulo">Integrantes</div>
        <div class="colaborador-linha">
            <div class="cargo-label motorista-cor">Motorista</div>
            <select id="motorista">
                <option value="" disabled selected>Selecionar Motorista...</option>
            </select>
        </div>

        <div class="colaborador-linha">
            <div class="cargo-label eletricista-cor">Eletricista</div>
            <select id="eletricista">
                <option value="" disabled selected>Selecionar Eletricista...</option>
            </select>
        </div>

        <button class="btn-registrar-geral" id="btnSalvar" onclick="registrarTudo()">
            Registrar Taxa de Contato
        </button>
    </div>

    <button class="btn-historico" onclick="abrirHistorico()">Ver Histórico e Pendências</button>

    <div id="modalHistorico" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="fecharHistorico()">FECHAR</div>
            
            <h2 style="margin-top: 40px;">Registros Realizados</h2>
            <div id="listaRegistros">
                </div>

            <div class="pendentes-container">
                <h2 style="color: #e74c3c; margin-top: 0;">Pendências</h2>
                <div id="listaPendentes"></div>
            </div>
        </div>
    </div>

    <script>
        const todosColaboradores = [
            "1460 - ALDAIR FERREIRA DOS SANTOS", "1412 - CARLOS DANIEL DE M SILVA", "1640 - DAHLIN ALVES DE OLIVEIRA",
            "1458 - DENISVALDO VERAS DOS SANTOS", "1959 - DIEGO DIEFLEI ARAUJO DA COSTA", "1980 - DNILSON CORDELIO OLIVEIRO",
            "1463 - ELISSANDRO BORGES BRITO", "1499 - FERNANDO SOARES DA SILVA", "1992 - FRANCISCO DE ASSIS DE OLIVEIRA",
            "1645 - FRANCISCO DE ASSIS FELIX DA CONCEIÇÃO", "1623 - FRANCISCO MOACIR G O NETO", "1505 - FRANCISCO ROGERIO DE ARAUJO",
            "1503 - GELSON GOMES DE SOUSA", "1464 - GUILHEME GONÇALVES DOS SANTOS", "1911 - HEGON RODRIGUES LIMA",
            "1432 - ISRAEL FERREIRA DE SOUSA RODRIGUES", "1514 - JOÃO FERREIRA DE ANDRADE NETO", "1702 - JOSÉ ADÃO ANTUNES MENDES",
            "1647 - JOSE KLEBER ANDRADE CABRAL", "1636 - LEANDRO SANTOS DE FARIAS", "1606 - LEONARDO PEIXOTO DIAS",
            "1648 - LUCAS LOPES DA SILVA FERREIRA", "1709 - MARCOS ANTONIO SILVA", "1512 - MARCUS COUTINHO LUCENA",
            "1450 - MARUILO ALVES RODRIGUES", "1496 - RAFAEL DA SILVA", "1422 - RAIMUNDO DINIZ DA SILVA",
            "1712 - ROBSON BRANDÃO SOARES", "1964 - WELISON PEDRO PATRICIO DA SILVA"
        ];

        function carregarSelects() {
            const m = document.getElementById('motorista');
            const e = document.getElementById('eletricista');
            todosColaboradores.forEach(n => {
                m.options[m.options.length] = new Option(n, n);
                e.options[e.options.length] = new Option(n, n);
            });
        }
        window.onload = carregarSelects;

        function registrarTudo() {
            const btn = document.getElementById('btnSalvar');
            const eq = document.getElementById('equipe').value;
            const mot = document.getElementById('motorista').value;
            const ele = document.getElementById('eletricista').value;

            if (!eq || !mot || !ele) { alert("Preencha tudo!"); return; }

            const agora = new Date();
            const data = agora.toLocaleDateString('pt-BR');
            const hora = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

            const reg = { data, hora, equipe: eq, motorista: mot, eletricista: ele };
            let historico = JSON.parse(localStorage.getItem('historicoTaxas')) || [];
            historico.push(reg);
            localStorage.setItem('historicoTaxas', JSON.stringify(historico));

            btn.innerHTML = "✓ REGISTRADO!";
            btn.style.backgroundColor = "#27ae60";
            
            setTimeout(() => {
                document.getElementById('equipe').selectedIndex = 0;
                document.getElementById('motorista').selectedIndex = 0;
                document.getElementById('eletricista').selectedIndex = 0;
                btn.innerHTML = "Registrar Taxa de Contato";
                btn.style.backgroundColor = "#2ecc71";
            }, 1000);
        }

        function abrirHistorico() {
            const listaR = document.getElementById('listaRegistros');
            const listaP = document.getElementById('listaPendentes');
            let registros = JSON.parse(localStorage.getItem('historicoTaxas')) || [];
            const hoje = new Date().toLocaleDateString('pt-BR');
            
            let feitosHoje = [];
            listaR.innerHTML = "";

            registros.slice().reverse().forEach(r => {
                if(r.data === hoje) {
                    feitosHoje.push(r.motorista);
                    feitosHoje.push(r.eletricista);
                    
                    listaR.innerHTML += `
                        <div class="registro-card">
                            <div class="registro-header">
                                <span>📅 ${r.data}</span>
                                <span>⏰ ${r.hora}</span>
                            </div>
                            <div class="registro-info"><strong>Equipe:</strong> ${r.equipe}</div>
                            <div class="registro-info"><strong>Motorista:</strong> ${r.motorista}</div>
                            <div class="registro-info"><strong>Eletricista:</strong> ${r.eletricista}</div>
                        </div>
                    `;
                }
            });

            if(listaR.innerHTML === "") listaR.innerHTML = "<p>Nenhum registro hoje.</p>";

            listaP.innerHTML = "";
            let faltam = todosColaboradores.filter(n => !feitosHoje.includes(n));
            
            if(faltam.length === 0) {
                listaP.innerHTML = "<p style='color:green'>✅ Todos OK!</p>";
            } else {
                faltam.forEach(p => {
                    listaP.innerHTML += `<div class="linha-pendente">• ${p}</div>`;
                });
            }
            document.getElementById('modalHistorico').style.display = "block";
        }

        function fecharHistorico() {
            document.getElementById('modalHistorico').style.display = "none";
        }
    </script>
</body>
</html>
